<main class="main">
  <div class="content">
    <div class="left-side" *ngIf="!router.url.includes('control')">

      <div class="setup-wrapper">

        <form [formGroup]="ipForm" (ngSubmit)="onSubmit()">
          <label for="ip">Drohnen IP-Adresse</label>
          <input id="ip" type="text" formControlName="droneIp" placeholder="z.B. 192.168.1.1">

          <div class="error-message" *ngIf="ipForm.get('droneIp')?.touched && ipForm.get('droneIp')?.invalid">
            <small>IP wird benötigt.</small>
          </div>

          <button type="submit" [disabled]="isConnecting || isConnected">
            {{ isConnected ? 'VERBUNDEN' : (isConnecting ? 'Verbinde...' : 'VERBINDEN') }}
          </button>

          <button
            type="button"
            class="btn-disconnect"
            *ngIf="isConnected"
            (click)="onDisconnect()">
            TRENNEN
          </button>

          <div class="landing-section" *ngIf="isLanded">

            <hr>

            <label for="courseName">Flug abgeschlossen: Kursname vergeben</label>

            <input

              id="courseName"

              type="text"

              formControlName="courseName"

              placeholder="z.B. Rundflug_Alpen_01">



            <div class="error-message" *ngIf="ipForm.get('courseName')?.touched && ipForm.get('courseName')?.invalid">

              <small>Bitte gib einen Namen zum Speichern an.</small>

            </div>



            <button type="button" class="btn-save" (click)="saveFlightCourse()">

              IN DATENBANK SPEICHERN

            </button>

          </div>


        </form>

        <div class="test-steuerung" *ngIf="isConnected">
          <label>Steuerung wählen</label>

          <div class="mode-section">
            <button
              type="button"
              class="mode-btn"
              [class.active]="droneService.selectedMode === 'controlkeyboard'"
              (click)="selectMode('controlkeyboard')">
              Tastatur
            </button>
            <button
              type="button"
              class="mode-btn"
              [class.active]="droneService.selectedMode === 'controlps'"
              (click)="selectMode('controlps')">
              Controller
            </button>
            <button
              type="button"
              class="mode-btn"
              [class.active]="droneService.selectedMode === 'controltouch'"
              (click)="selectMode('controltouch')">
              Joysticks
            </button>
          </div>

          <div class="button-row">
            <button
              type="button"
              class="btn-gruen"
              [disabled]="!droneService.selectedMode"
              (click)="onContinue()">
              WEITER
            </button>
          </div>
        </div>

      </div>
    </div>
    <router-outlet />
  </div>
</main>
