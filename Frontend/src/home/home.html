<main class="main">
  <div class="content" *ngIf="!router.url.includes('control')">

    <div class="main-layout">

      <div class="setup-wrapper">

        <div class="header-bar">
          <span class="header-title">Gerät hinzufügen</span>

          <form [formGroup]="ipForm" (ngSubmit)="onAddNewDevice()" class="header-form">
            <input
              type="text"
              formControlName="droneIp"
              placeholder="IP-Adresse der neuen Drohne">

            <button
              type="submit"
              class="btn-primary-windows"
              [disabled]="isAddingNew || ipForm.invalid">
              {{ isAddingNew ? 'Suche...' : 'Hinzufügen' }}
            </button>
          </form>
        </div>

        <div class="device-list" *ngIf="savedDrones.length > 0">
          <div class="device-item" *ngFor="let drone of savedDrones">
            <div class="device-info">
              <div class="device-icon">
                <img src="telloDrone.svg" alt="Tello" class="drone-svg">
              </div>
              <div class="device-details">
                <span class="device-name">{{ drone.name || 'Tello Drohne' }}</span>
                <span class="device-status">
                  IP: {{ drone.ip }} |
                  <span [style.color]="isConnected && activeIp === drone.ip ? '#28a745' : '#666'">
                    {{ isConnected && activeIp === drone.ip ? 'Verbunden' : 'Bereit' }}
                  </span>
                </span>
              </div>
            </div>

            <div class="device-actions">
              <button
                type="button"
                class="btn-connect-list"
                [class.active-conn]="isConnected && activeIp === drone.ip"
                [disabled]="connectingIp !== null && connectingIp !== drone.ip"
                (click)="handleConnection(drone.ip)">

                <ng-container *ngIf="connectingIp === drone.ip; else buttonLabel">
                  Suche...
                </ng-container>
                <ng-template #buttonLabel>
                  {{ isConnected && activeIp === drone.ip ? 'Trennen' : 'Verbinden' }}
                </ng-template>
              </button>
            </div>
          </div>
        </div>

        <div class="device-list" *ngIf="savedDrones.length === 0">
          <div class="device-item empty-state">
            Keine gespeicherten Drohnen gefunden.
          </div>
        </div>

        <div class="test-steuerung" *ngIf="isConnected">
          <label class="section-label">Wie möchtest du fliegen?</label>

          <div class="mode-section">
            <button class="mode-btn"
                    [class.active]="setupType === 'manual'"
                    (click)="setSetupType('manual')">
              Manuelle Steuerung
            </button>
            <button class="mode-btn"
                    [class.active]="setupType === 'auto'"
                    (click)="setSetupType('auto')">
              Flugkurs abspielen
            </button>
          </div>

          <div class="mode-section" *ngIf="setupType === 'manual'">
            <button class="mode-btn" [class.active]="droneService.selectedMode === 'controlkeyboard'" (click)="selectMode('controlkeyboard')">Tastatur</button>
            <button class="mode-btn" [class.active]="droneService.selectedMode === 'controlps'" (click)="selectMode('controlps')">Controller</button>
            <button class="mode-btn" [class.active]="droneService.selectedMode === 'controltouch'" (click)="selectMode('controltouch')">Joysticks</button>
          </div>

          <div class="flight-selection-container" *ngIf="setupType === 'auto'">
            <div class="flight-list-header">Gespeicherte Kurse:</div>
            <div class="flight-list-body">
              <div *ngFor="let f of savedFlights"
                   class="flight-row"
                   [class.active-flight]="droneService.selectedAutoFlight === f"
                   (click)="selectFlight(f)">
                <span class="flight-name">{{f}}</span>
              </div>
            </div>
          </div>

          <button class="btn-primary-action"
                  *ngIf="setupType"
                  [disabled]="(setupType === 'manual' && !droneService.selectedMode) ||
                             (setupType === 'auto' && !droneService.selectedAutoFlight)"
                  (click)="onContinue()">
            {{ setupType === 'auto' ? 'FLUGKURS STARTEN' : 'WEITER ZUM FLUG' }}
          </button>
        </div>
      </div> <div class="led-area" *ngIf="isConnected">
      <div class="led-card">
        <div class="led-header">
          <h3>Matrix Steuerung</h3>
          <span class="led-badge">8x8</span>
        </div>
        <p class="led-subtitle">Klicke Pixel zum Aktivieren</p>

        <div class="matrix-grid">
          <div *ngFor="let row of ledMatrix; let r = index" class="matrix-row">
            <div *ngFor="let led of row; let c = index"
                 class="led-pixel"
                 [class.active]="ledMatrix[r][c]"
                 (click)="toggleLed(r, c)">
            </div>
          </div>
        </div>

        <div class="matrix-footer">
          <span>Verbunden mit: <strong>{{ activeIp }}</strong></span>
        </div>
      </div>
    </div>

    </div> </div>
</main>
