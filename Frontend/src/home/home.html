<main class="main">
  <div class="content" *ngIf="!router.url.includes('control')">
    <div class="setup-wrapper">

      <form [formGroup]="ipForm" (ngSubmit)="onSubmit()">
        <label>Drohnen IP-Adresse</label>
        <input type="text" formControlName="droneIp">
        <button type="submit" [disabled]="isConnected">VERBINDEN</button>
      </form>

      <button
        type="button"
        class="btn-disconnect"
        *ngIf="isConnected"
        (click)="onDisconnect()">
        TRENNEN
      </button>

      <div class="landing-section" *ngIf="isLanded">
        <hr>
        <label for="courseName">Flug abgeschlossen: Kursname vergeben</label>
        <input
          id="courseName"
          type="text"
          formControlName="courseName"
          placeholder="z.B. Rundflug_Alpen_01">
        <div class="error-message" *ngIf="ipForm.get('courseName')?.touched && ipForm.get('courseName')?.invalid">
          <small>Bitte gib einen Namen zum Speichern an.</small>
        </div>
        <button type="button" class="btn-save" (click)="saveFlightCourse()">
          IN DATENBANK SPEICHERN
        </button>
      </div>

      <div class="test-steuerung" *ngIf="isConnected">
        <label>Wie möchtest du fliegen?</label>
        <div class="mode-section">
          <button class="mode-btn" [class.active]="setupType === 'manual'" (click)="setSetupType('manual')">Manuelle Steuerung</button>
          <button class="mode-btn" [class.active]="setupType === 'auto'" (click)="setSetupType('auto')">Flugkurs abspielen</button>
        </div>

        <div class="mode-section" *ngIf="setupType === 'manual'">
          <button class="mode-btn" [class.active]="droneService.selectedMode === 'controlkeyboard'" (click)="selectMode('controlkeyboard')">Tastatur</button>
          <button class="mode-btn" [class.active]="droneService.selectedMode === 'controlps'" (click)="selectMode('controlps')">Controller</button>
          <button class="mode-btn" [class.active]="droneService.selectedMode === 'controltouch'" (click)="selectMode('controltouch')">Joysticks</button>
        </div>

        <div class="flight-list" *ngIf="setupType === 'auto'" style="width: 100%;">
          <div *ngFor="let f of savedFlights"
               class="mode-btn"
               [class.active]="droneService.selectedAutoFlight === f"
               (click)="selectFlight(f)"
               style="display: block; margin: 5px; text-align: center; border: 1px solid #ddd;">
            {{f}}
          </div>
        </div>

        <button class="btn-gruen"
                *ngIf="setupType"
                [disabled]="!droneService.selectedMode && !droneService.selectedAutoFlight"
                (click)="onContinue()">
          WEITER ZUM FLUG
        </button>
      </div>
    </div>
  </div>
</main>
